---
layout: default
---

{% include base_path %}

<div class="profile-container">
  {% include profile-header.html %}

  <nav class="profile-tabs">
    <a href="{{ base_path }}/"{% if page.url == "/" %} class="active"{% endif %}>The Backstory</a>
    <a href="{{ base_path }}/publications/"{% if page.url contains "/publications" %} class="active"{% endif %}>Publications</a>
    <a href="{{ base_path }}/teaching/"{% if page.url contains "/teaching" %} class="active"{% endif %}>Teaching</a>
    <a href="{{ base_path }}/talks/"{% if page.url contains "/talks" %} class="active"{% endif %}>Talks</a>
  </nav>

  <div class="profile-content">
    {{ content }}
  </div>
</div>
